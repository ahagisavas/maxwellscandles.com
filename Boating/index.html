<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maxwell Boating Tours Forecast | Hoboken</title>
  <meta property="og:title" content="Maxwell Boating Tours Forecast">
  <meta property="og:description" content="Real-time GO/NO boating conditions from Shipyard Marina, Hoboken.">
  <meta property="og:image" content="https://maxwellscandles.com/Boating/Maxwell_Blue.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Maxwell Boating Tours Forecast">
  <meta name="twitter:image" content="https://maxwellscandles.com/Boating/Maxwell_Blue.png">
  <style>
    :root {
      --navy:       #07111f;
      --navy-mid:   #0d1e35;
      --navy-light: #152c4a;
      --teal:       #00b4d8;
      --teal-dim:   rgba(0,180,216,0.18);
      --green:      #2ecc71;
      --green-bg:   rgba(46,204,113,0.12);
      --yellow:     #f4a020;
      --yellow-bg:  rgba(244,160,32,0.12);
      --red:        #e74c3c;
      --red-bg:     rgba(231,76,60,0.12);
      --white:      #f0f4f8;
      --gray1:      #7fa8c8;
      --gray2:      #3a5570;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.85rem;
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* ── HEADER ── */
    .header {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--teal-dim);
      padding: 0.8rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .header h1 { font-size: 1.05rem; font-weight: 700; color: var(--teal); letter-spacing: 0.04em; }
    .header p  { font-size: 0.65rem; color: var(--gray1); margin-top: 2px; }
    .refresh-btn {
      background: var(--teal-dim);
      border: 1px solid var(--teal);
      border-radius: 20px;
      color: var(--teal);
      padding: 0.38rem 0.9rem;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: rgba(0,180,216,0.32); }

    /* ── ALERT BANNER ── */
    .alert-banner {
      background: rgba(231,76,60,0.12);
      border-bottom: 2px solid var(--red);
      padding: 0.6rem 1.25rem;
      font-size: 0.75rem;
      color: #ffaaaa;
      line-height: 1.5;
    }

    /* ── CONDITIONS BAR ── */
    .cond-bar {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--teal-dim);
      padding: 0.5rem 1.25rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--gray1);
    }
    .cond-bar strong { color: var(--white); }

    /* ── CONTENT ── */
    .content { padding: 1rem; max-width: 720px; margin: 0 auto; }

    /* ── ROUTE CARDS ── */
    .routes { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.85rem; }
    .route-card {
      background: var(--navy-mid);
      border: 1px solid var(--teal-dim);
      border-radius: 14px;
      padding: 1rem 0.75rem;
      text-align: center;
    }
    .route-icon   { margin-bottom: 0.3rem; line-height: 1; }
    .route-icon img { width: 52px; height: 52px; object-fit: cover; border-radius: 50%; }
    .route-name   { font-size: 0.62rem; color: var(--gray1); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
    .status-badge {
      display: inline-block;
      padding: 0.4rem 1.1rem;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }
    .status-badge.green  {
      background: var(--green);
      color: #fff;
      border: 2px solid var(--green);
      box-shadow: 0 0 18px rgba(46,204,113,0.6), 0 0 40px rgba(46,204,113,0.25);
      animation: goPulse 2s ease-in-out infinite;
      font-size: 1.15rem;
    }
    @keyframes goPulse {
      0%, 100% { box-shadow: 0 0 18px rgba(46,204,113,0.6), 0 0 40px rgba(46,204,113,0.25); }
      50%       { box-shadow: 0 0 28px rgba(46,204,113,0.9), 0 0 60px rgba(46,204,113,0.4); }
    }
    .status-badge.yellow { background: var(--yellow-bg); color: var(--yellow); border: 2px solid var(--yellow); }
    .status-badge.red    { background: var(--red-bg);    color: var(--red);    border: 2px solid var(--red);    }
    .route-note { font-size: 0.63rem; color: var(--gray1); margin-top: 0.5rem; line-height: 1.4; }
    .route-note strong { color: var(--white); }
    .route-score { margin-top: 0.55rem; }
    .score-bar-bg { height: 5px; background: var(--navy-light); border-radius: 3px; margin-bottom: 0.25rem; }
    .score-bar { height: 5px; border-radius: 3px; transition: width 0.4s ease; }
    .score-num { font-size: 0.62rem; color: var(--gray1); }

    /* ── SUMMARY ── */
    .summary-card {
      background: var(--navy-mid);
      border: 1px solid var(--teal-dim);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.85rem;
    }
    .card-title {
      font-size: 0.6rem;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 0.6rem;
      font-weight: 700;
    }
    .summary-text { font-size: 0.8rem; line-height: 1.65; color: var(--white); }
    .rec-box {
      margin-top: 0.7rem;
      padding: 0.55rem 0.85rem;
      border-radius: 10px;
      border-left: 3px solid;
      font-size: 0.78rem;
      line-height: 1.6;
      font-weight: 500;
    }
    .rec-box.green  { background: var(--green-bg);  border-color: var(--green);  color: #90ffc0; }
    .rec-box.yellow { background: var(--yellow-bg); border-color: var(--yellow); color: #ffd98a; }
    .rec-box.red    { background: var(--red-bg);    border-color: var(--red);    color: #ffaaaa; }

    /* ── ROUTE COMPARE ── */
    .compare-card {
      background: var(--navy-mid);
      border: 1px solid var(--teal-dim);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .compare-icon { flex-shrink: 0; }
    .compare-icon img { width: 48px; height: 48px; object-fit: contain; }
    .compare-body { flex: 1; }
    .compare-label {
      font-size: 0.6rem;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .compare-winner {
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.2rem;
    }
    .compare-reason { font-size: 0.72rem; color: var(--gray1); line-height: 1.5; }
    .compare-tie { font-size: 0.85rem; font-weight: 600; color: var(--gray1); }

    /* ── HOURLY ── */
    .hourly-card {
      background: var(--navy-mid);
      border: 1px solid var(--teal-dim);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.85rem;
    }
    .hourly-scroll { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; }
    .h-block { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; min-width: 38px; }
    .h-label { font-size: 0.55rem; color: var(--gray1); white-space: nowrap; }
    .h-label.now { color: var(--teal); font-weight: 700; }
    .h-box {
      width: 34px; min-height: 44px; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
      font-size: 0.58rem; font-weight: 800; letter-spacing: 0.02em;
    }
    .h-box.green  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green); }
    .h-box.yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow); }
    .h-box.red    { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red); }
    .h-box.past   { opacity: 0.28; }
    .h-box.ideal  {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 0 14px rgba(46,204,113,0.7), 0 0 30px rgba(46,204,113,0.3);
      animation: goPulse 2s ease-in-out infinite;
      font-size: 0.52rem;
    }
    .h-wind { font-size: 0.5rem; color: var(--gray1); }
    .h-block .h-box.past ~ .h-wind, .h-wind.past { color: var(--gray2); }

    /* ── TRIP PLANNER ── */
    .tp-select {
      background: var(--navy-light);
      border: 1px solid var(--teal-dim);
      border-radius: 8px;
      color: var(--white);
      padding: 0.38rem 0.6rem;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .tp-btn {
      background: var(--teal-dim);
      border: 1px solid var(--teal);
      border-radius: 8px;
      color: var(--teal);
      padding: 0.38rem 0.85rem;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }
    .tp-btn:hover { background: rgba(0,180,216,0.32); }
    .tp-result { margin-top: 0.65rem; font-size: 0.78rem; line-height: 1.6; }
    .tp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.35rem 0.75rem;
      font-size: 0.75rem;
    }
    .tp-col-head { color: var(--gray1); font-size: 0.68rem; }

    /* ── LOADING / ERROR ── */
    .loading { text-align: center; padding: 4rem 1rem; color: var(--gray1); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--teal-dim);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; font-size: 0.6rem; color: var(--gray2); margin-top: 0.5rem; }

    /* ── HERO VERDICT ── */
    .hero-verdict {
      text-align: center;
      padding: 1.8rem 1rem 1.5rem;
      background: linear-gradient(180deg, var(--navy-mid) 0%, var(--navy) 100%);
      border-bottom: 1px solid var(--teal-dim);
    }
    .hero-label {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .hero-sub { font-size: 0.8rem; color: var(--gray1); margin-top: 0.4rem; }
    .hero-green  { color: var(--green);  animation: heroGlowG 2.5s ease-in-out infinite; }
    .hero-yellow { color: var(--yellow); }
    .hero-red    { color: var(--red); }
    @keyframes heroGlowG {
      0%,100% { text-shadow: 0 0 24px rgba(46,204,113,0.55); }
      50%      { text-shadow: 0 0 52px rgba(46,204,113,0.95), 0 0 100px rgba(46,204,113,0.35); }
    }

    /* ── GAUGE CARDS ── */
    .gauge-card {
      background: var(--navy-mid);
      border: 1px solid var(--teal-dim);
      border-radius: 16px;
      padding: 1rem 0.75rem 0.8rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .gauge-route-name {
      font-size: 0.6rem;
      color: var(--gray1);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
      text-align: center;
    }
    .gauge-icon-img { width: 54px; height: 54px; object-fit: cover; border-radius: 50%; margin-bottom: 0.4rem; box-shadow: 0 0 10px rgba(0,180,216,0.3); }
    .gauge-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
      margin-bottom: 0.4rem;
    }
    .gauge-badge.green  { background: var(--green); color: #fff; box-shadow: 0 0 16px rgba(46,204,113,0.5); animation: goPulse 2s ease-in-out infinite; }
    .gauge-badge.yellow { background: var(--yellow-bg); color: var(--yellow); border: 1.5px solid var(--yellow); }
    .gauge-badge.red    { background: var(--red-bg);    color: var(--red);    border: 1.5px solid var(--red); }
    .gauge-note { font-size: 0.62rem; color: var(--gray1); line-height: 1.4; }
    .gauge-note strong { color: var(--white); }

    /* ── CONDITION THEME ── */
    body { transition: background-color 1.2s ease; }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      z-index: 9999;
      transition: background 1.2s ease, box-shadow 1.2s ease;
    }
    body.theme-green  { --navy: #061710; --navy-mid: #0c2016; background-color: #061710; }
    body.theme-yellow { --navy: #151009; --navy-mid: #1d1710; background-color: #151009; }
    body.theme-red    { --navy: #140808; --navy-mid: #1d0e0e; background-color: #140808; }
    body.theme-green::before  { background: var(--green);  box-shadow: 0 0 14px rgba(46,204,113,0.9); }
    body.theme-yellow::before { background: var(--yellow); box-shadow: 0 0 14px rgba(244,160,32,0.9); }
    body.theme-red::before    { background: var(--red);    box-shadow: 0 0 14px rgba(231,76,60,0.9); }

    /* ── COMBINED TIMELINE ── */
    .timeline-section {
      background: var(--navy-mid);
      border-bottom: 2px solid var(--teal-dim);
      padding: 0.8rem 0 0.7rem;
    }
    .tl-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem; margin-bottom: 0.55rem;
    }
    .tl-title  { font-size: 0.62rem; color: var(--teal); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
    .tl-viewing { font-size: 0.7rem; color: var(--white); font-weight: 700; }
    .tl-legend {
      display: flex; gap: 1rem; padding: 0 1rem; margin-bottom: 0.4rem;
    }
    .tl-legend-item {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.55rem; color: var(--gray1); text-transform: uppercase; letter-spacing: 0.08em;
    }
    .tl-legend-item img { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }
    .tl-scroll {
      display: flex; gap: 4px; overflow-x: auto;
      padding: 0 0.75rem 0.5rem; scroll-behavior: smooth;
    }
    .tl-scroll::-webkit-scrollbar { height: 3px; }
    .tl-scroll::-webkit-scrollbar-thumb { background: var(--teal-dim); border-radius: 2px; }
    .t-col {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      flex-shrink: 0; width: 42px; cursor: pointer; border-radius: 9px;
      padding: 5px 3px 4px; transition: background 0.15s; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .t-col:active { background: rgba(0,180,216,0.2); }
    .t-col.t-selected { background: rgba(0,180,216,0.18); outline: 1.5px solid var(--teal); outline-offset: -1px; }
    .t-col.t-past { opacity: 0.28; }
    .t-hour-lbl { font-size: 0.5rem; color: var(--white); white-space: nowrap; font-weight: 600; }
    .t-col.t-now .t-hour-lbl   { color: var(--teal); font-weight: 800; font-size: 0.52rem; }
    .t-col.t-selected .t-hour-lbl { color: var(--teal); font-weight: 700; }
    .t-dot { width: 34px; height: 24px; border-radius: 6px; border: 1px solid; }
    .t-dot.green  { background: var(--green-bg);  border-color: var(--green); }
    .t-dot.yellow { background: var(--yellow-bg); border-color: var(--yellow); }
    .t-dot.red    { background: var(--red-bg);    border-color: var(--red); }
    .t-dot.ideal  { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px rgba(46,204,113,0.7); }

    @media (max-width: 420px) {
      .routes { gap: 0.5rem; }
      .route-card { padding: 0.8rem 0.5rem; }
      .status-badge { font-size: 0.88rem; padding: 0.35rem 0.8rem; }
      .hero-label { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <img src="Maxwell_Blue.png" alt="Maxwell Blue" style="height:60px;width:auto;">
    <div>
      <h1>⚓ Maxwell Boating Tours Forecast</h1>
      <p>Shipyard Marina, Hoboken · Hudson River</p>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadForecast()">↻ Refresh</button>
</header>

<div id="app">
  <div class="loading"><div class="spinner"></div><p>Loading conditions…</p></div>
</div>

<script>
const LAT = 40.7278, LON = -74.0282;

const ROUTES = {
  liberty: { name: 'Statue of Liberty', icon: '🗽', label: 'South Route', bearing: 170 },
  gwb:     { name: 'GW Bridge',         icon: '🌉', label: 'North Route', bearing: 355 }
};

let forecastData = null;
let lastLoadTime = Date.now();

// ── UTILITY ──────────────────────────────────────────────────────────────────

function angleDiff(a, b) {
  let d = Math.abs(a - b) % 360;
  return d > 180 ? 360 - d : d;
}

function libertyTrafficMult(windDir, hour) {
  const isWeekend = [0, 6].includes(new Date().getDay());

  // NY Waterway commuter ferries — Hoboken ↔ Manhattan crossings
  let ferryMult;
  if (!isWeekend) {
    if      (hour >= 6  && hour < 9)  ferryMult = 1.22;
    else if (hour >= 17 && hour < 20) ferryMult = 1.18;
    else                              ferryMult = 1.10;
  } else {
    if (hour >= 10 && hour < 18)      ferryMult = 1.08;
    else                              ferryMult = 1.03;
  }

  // Liberty Cruises / Statue Cruises — large sightseeing vessels, massive wakes
  // Depart every ~30 min from Liberty State Park & Battery Park, ~9am–5:30pm
  const libertyCruisesMult = (hour >= 9 && hour < 18)
    ? (isWeekend ? 1.45 : 1.30)
    : 1.0;

  const manhattanTurbulence = (windDir >= 60 && windDir <= 120) ? 1.12 : 1.0;
  return ferryMult * libertyCruisesMult * manhattanTurbulence;
}

function getScore(windSpeed, windDir, tidePhase, routeKey, hour) {
  const riverAlign  = angleDiff(windDir % 180, 0);
  const fetchFactor = 1 + 0.45 * (1 - riverAlign / 90);
  const fromNorth   = windDir >= 315 || windDir <= 45;
  const fromSouth   = windDir >= 135 && windDir <= 225;
  let tideMult = 1.0;
  if (tidePhase === 'flood') { if (fromSouth) tideMult = 1.28; else if (fromNorth) tideMult = 0.85; }
  else if (tidePhase === 'ebb') { if (fromNorth) tideMult = 1.28; else if (fromSouth) tideMult = 0.85; }
  const headwind   = angleDiff(windDir, ROUTES[routeKey].bearing);
  const headFactor = headwind < 45 ? 1.15 : 1.0;
  let score = windSpeed * fetchFactor * tideMult * headFactor;
  if (routeKey === 'liberty') {
    const fromHarborSector = windDir >= 150 && windDir <= 270;
    const fromDirectSouth  = windDir >= 160 && windDir <= 200;
    if (fromDirectSouth) score *= 1.45; else if (fromHarborSector) score *= 1.25;
    if (hour >= 14) score *= 1.38; else if (hour >= 11) score *= 1.22;
    else if (hour >= 9) score *= 1.10;
    score *= 1.18;
    score *= libertyTrafficMult(windDir, hour);
  }
  return score;
}

function getStatus(windSpeed, gustSpeed, windDir, tidePhase, routeKey, hour) {
  const score = getScore(windSpeed, windDir, tidePhase, routeKey, hour);
  if (windSpeed >= 20 || gustSpeed >= 25 || score >= 28) return 'red';
  if (windSpeed >= 11 || gustSpeed >= 17 || score >= 16) return 'yellow';
  return 'green';
}

function weatherIcon(code) {
  if (code === 0)  return '☀️ Clear';
  if (code <= 3)   return '⛅ Partly cloudy';
  if (code <= 48)  return '🌫️ Foggy';
  if (code <= 57)  return '🌦️ Drizzle';
  if (code <= 67)  return '🌧️ Rain';
  if (code <= 77)  return '❄️ Snow';
  if (code <= 82)  return '🌦️ Showers';
  if (code >= 95)  return '⛈️ Storm';
  return '🌤️';
}

function windLabel(deg) {
  const d = ['North','North-Northeast','Northeast','East-Northeast','East','East-Southeast','Southeast','South-Southeast','South','South-Southwest','Southwest','West-Southwest','West','West-Northwest','Northwest','North-Northwest'];
  return d[Math.round(deg / 22.5) % 16];
}

function windContext(deg) {
  if (deg >= 338 || deg < 23)  return 'coming from the George Washington Bridge direction';
  if (deg >= 23  && deg < 68)  return 'coming from the George Washington Bridge direction, slightly inland';
  if (deg >= 68  && deg < 113) return 'coming from across the river — blowing in from Manhattan';
  if (deg >= 113 && deg < 158) return 'coming from lower Manhattan, toward the Statue of Liberty side';
  if (deg >= 158 && deg < 203) return 'coming from the Statue of Liberty direction — straight out of the open harbor';
  if (deg >= 203 && deg < 248) return 'coming from the Statue of Liberty direction, slightly inland';
  if (deg >= 248 && deg < 293) return 'coming from New Jersey — blowing from behind the marina toward Manhattan';
  if (deg >= 293 && deg < 338) return 'coming from New Jersey — blowing toward Manhattan and up toward the GW Bridge';
  return '';
}

function fmtHour(h) {
  if (h === 0)  return '12am';
  if (h === 12) return '12pm';
  return h < 12 ? `${h}am` : `${h-12}pm`;
}

function tidePhaseAt(tideEvents, hour) {
  if (!tideEvents || !tideEvents.length) return 'unknown';
  let before = null, after = null;
  for (const t of tideEvents) {
    if (t.hour <= hour) before = t;
    else if (!after) after = t;
  }
  if (before && after) return before.type === 'L' ? 'flood' : 'ebb';
  if (before) return before.type === 'H' ? 'ebb' : 'flood';
  if (after)  return after.type  === 'H' ? 'flood' : 'ebb';
  return 'unknown';
}

function beBackBy(statuses, nowHour) {
  if (statuses[nowHour] === 'red') return null;
  let last = nowHour;
  for (let h = nowHour; h <= 22; h++) {
    if (!statuses[h] || statuses[h] === 'red') break;
    last = h;
  }
  return last >= 22 ? null : last;
}

// 0–100 score: 100 = perfect, 0 = stay docked
// Uses same chop model as getScore/getStatus, inverted and scaled
function routeDisplayScore(windSpeed, gustSpeed, windDir, tidePhase, routeKey, hour) {
  const chop = getScore(windSpeed, windDir, tidePhase, routeKey, hour);
  const effective = Math.max(
    chop,
    windSpeed >= 20 ? 40 : windSpeed >= 11 ? 16 : windSpeed * 0.7,
    gustSpeed >= 25 ? 40 : gustSpeed >= 17 ? 16 : 0
  );
  return Math.max(0, Math.min(100, Math.round(100 - effective * 2.3)));
}

// Approximate sunset time for a given lat/lon using local timezone
function sunsetTime(lat, lon) {
  const now = new Date();
  const dy  = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  const decl = -23.45 * Math.cos(2 * Math.PI * (dy + 10) / 365) * Math.PI / 180;
  const latR = lat * Math.PI / 180;
  const cosH = -Math.tan(latR) * Math.tan(decl);
  if (Math.abs(cosH) > 1) return null;
  const H = Math.acos(cosH) * 180 / Math.PI;
  const solarNoonUTC = 12 - lon / 15;
  let t = solarNoonUTC + H / 15 + (-now.getTimezoneOffset() / 60);
  if (t >= 24) t -= 24;
  const h = Math.floor(t);
  const m = Math.round((t - h) * 60) % 60;
  return `${h > 12 ? h - 12 : (h === 0 ? 12 : h)}:${m.toString().padStart(2, '0')}${h >= 12 ? 'pm' : 'am'}`;
}

// Rotated arrow showing wind direction
function dirArrow(deg) {
  return `<span style="display:inline-block;transform:rotate(${deg}deg);line-height:1;font-size:0.65rem">↑</span>`;
}

// Find the next H or L tide after now
function nextTideEvent(tideEvents, nowH, nowMin) {
  const nowTotal = nowH * 60 + nowMin;
  return (tideEvents || []).find(t => (t.hour * 60 + (t.minute || 0)) > nowTotal) || null;
}

// "high tide in 2h 15m"
function fmtTideCountdown(tide, nowH, nowMin) {
  if (!tide) return '';
  const diff = (tide.hour * 60 + (tide.minute || 0)) - (nowH * 60 + nowMin);
  if (diff <= 0 || diff > 720) return '';
  const h = Math.floor(diff / 60), m = diff % 60;
  const parts = h > 0 ? [h + 'h', m > 0 ? m + 'm' : ''].filter(Boolean) : [m + 'm'];
  const heightStr = tide.v != null ? ` · ${tide.v.toFixed(1)} ft` : '';
  return `${tide.type === 'H' ? 'high' : 'low'} tide in ${parts.join(' ')}${heightStr}`;
}

// Trip planner — called from onclick, uses global forecastData
function checkTrip() {
  if (!forecastData) return;
  const { hours, tideEvents, statuses } = forecastData;
  const dep = parseInt(document.getElementById('tp-depart').value);
  const dur = parseInt(document.getElementById('tp-dur').value);
  const ret = Math.min(dep + dur, 23);
  const depH = hours.find(h => h.hour === dep) || hours[0];
  const retH = hours.find(h => h.hour === ret) || hours[hours.length - 1];
  const depLib = getStatus(depH.wind, depH.gust, depH.dir, tidePhaseAt(tideEvents, dep), 'liberty', dep);
  const retLib = getStatus(retH.wind, retH.gust, retH.dir, tidePhaseAt(tideEvents, ret), 'liberty', ret);
  const depGwb = getStatus(depH.wind, depH.gust, depH.dir, tidePhaseAt(tideEvents, dep), 'gwb', dep);
  const retGwb = getStatus(retH.wind, retH.gust, retH.dir, tidePhaseAt(tideEvents, ret), 'gwb', ret);
  const col   = s => s === 'green' ? 'var(--green)' : s === 'yellow' ? 'var(--yellow)' : 'var(--red)';
  const lbl   = s => s === 'green' ? '✓ Ideal' : s === 'yellow' ? '~ Manageable' : '✗ Rough';
  const allBad = depLib === 'red' && retLib === 'red' && depGwb === 'red' && retGwb === 'red';
  const ok    = (depLib !== 'red' || depGwb !== 'red') && (retLib !== 'red' || retGwb !== 'red');
  document.getElementById('tp-result').innerHTML = `
    <div class="tp-grid">
      <div class="tp-col-head">Leaving ${fmtHour(dep)}</div>
      <div class="tp-col-head">Back by ${fmtHour(ret)}</div>
      <div>🗽 <span style="color:${col(depLib)};font-weight:700">${lbl(depLib)}</span></div>
      <div>🗽 <span style="color:${col(retLib)};font-weight:700">${lbl(retLib)}</span></div>
      <div>🌉 <span style="color:${col(depGwb)};font-weight:700">${lbl(depGwb)}</span></div>
      <div>🌉 <span style="color:${col(retGwb)};font-weight:700">${lbl(retGwb)}</span></div>
    </div>
    <p style="margin-top:0.5rem;font-size:0.72rem;color:${allBad ? 'var(--red)' : ok ? '#90ffc0' : 'var(--yellow)'}">
      ${allBad ? '⚠️ Rough both ways — try a different time.' : ok ? '✓ Conditions look manageable for this trip.' : '⚠️ One leg may be rough — check the hourly grid above.'}
    </p>`;
}

// True on major summer holidays when jet ski traffic is extreme
function isHolidayDate(date) {
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const dow = date.getDay();
  if (m === 7 && (d === 4 || (d === 3 && dow === 5) || (d === 5 && dow === 1))) return true; // July 4th
  if (m === 5 && dow === 1 && d >= 25) return true; // Memorial Day
  if (m === 9 && dow === 1 && d <= 7)  return true; // Labor Day
  return false;
}

// Returns 'none' | 'low' | 'moderate' | 'high' | 'extreme'
function jetSkiIndex(hour, month, isWeekend, isHoliday, tempF, weatherCode, windSpeed, precipProb) {
  if (month < 5 || month > 9) return 'none';
  if (hour < 9  || hour > 18) return 'none';

  // Rain kills jet ski activity — check both weather code and precip probability
  if (weatherCode > 48 || precipProb >= 60) return 'none';
  if (precipProb >= 35) return 'low';

  let score = 1.0;

  // Season weight
  const monthFactor = { 5: 0.7, 6: 1.1, 7: 1.5, 8: 1.5, 9: 0.8 };
  score *= monthFactor[month] || 0;

  // Day type
  if (isHoliday)       score *= 2.0;
  else if (isWeekend)  score *= 1.5;
  else                 score *= 0.55;

  // Peak hours
  if      (hour >= 11 && hour < 17) score *= 1.3;
  else if (hour >= 9  && hour < 11) score *= 0.8;
  else                              score *= 0.65;

  // Feels-like temperature — warm = more riders
  if      (tempF >= 88) score *= 1.6;
  else if (tempF >= 80) score *= 1.3;
  else if (tempF >= 72) score *= 1.0;
  else if (tempF >= 64) score *= 0.6;
  else                  score *= 0.25;

  // Sky/weather — clear sky required for extreme
  if      (weatherCode <= 1)  score *= 1.3;  // clear/sunny
  else if (weatherCode <= 3)  score *= 0.75; // partly cloudy — noticeably reduced
  else                        score *= 0.4;  // overcast/fog

  // Calm water = more jet skis
  if      (windSpeed <= 8)  score *= 1.2;
  else if (windSpeed <= 14) score *= 1.0;
  else if (windSpeed <= 20) score *= 0.65;
  else                      score *= 0.25;

  // Extreme requires both a high score AND clear sunny skies
  if (score >= 4.5 && weatherCode <= 1) return 'extreme';
  if (score >= 2.2) return 'high';
  if (score >= 0.85) return 'moderate';
  if (score >= 0.35) return 'low';
  return 'none';
}

// Rolling "X min ago" timer — runs independently of forecast refresh
setInterval(() => {
  const el = document.getElementById('last-updated');
  if (el) {
    const mins = Math.floor((Date.now() - lastLoadTime) / 60000);
    el.textContent = mins <= 0 ? 'just now' : `${mins} min ago`;
  }
}, 30000);

async function loadForecast() {

      const todayFull    = dateStr.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
      const tomorrowFull = tomorrowDateStr.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
      const allTides = (tideJson.predictions || []).map(p => {
        const [datePart, timePart] = p.t.split(' ');
        const [tH, tM] = timePart.split(':').map(Number);
        return { date: datePart, hour: tH, minute: tM, type: p.type, v: parseFloat(p.v) };
      });
      todayTides    = allTides.filter(t => t.date === todayFull);

    try {
      const cRes = await fetch(`https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?begin_date=${dateStr}&end_date=${dateStr}&station=ACT4186&product=currents_predictions&time_zone=lst_ldt&interval=h&units=english&application=bcs_boating&format=json`);
      const cJson = await cRes.json();
      if (cJson.predictions && cJson.predictions.length) {
        currentPredictions = cJson.predictions.map(p => ({
          hour:  parseInt(p.t.split(' ')[1].split(':')[0]),

    } catch (curErr) {

    // Parse hourly data

    const tempData     = weather.hourly.apparent_temperature || [];

    const allHours = weather.hourly.time.map((t, i) => ({

    // Pressure trend: compare now to 3 hours ago (falling = deteriorating)
    const pressurePrev  = (hours[Math.max(nowH - 3, 0)] || cur).pressure;
    const pressureDiff  = cur.pressure - pressurePrev;
    const pressureTrendLabel = pressureDiff < -3   ? '↓ Falling fast (deteriorating quickly)'
                             : pressureDiff < -1.5 ? '↓ Falling (conditions worsening)'

    const pressureTrendColor = pressureDiff < -1.5 ? 'var(--yellow)' : pressureDiff > 1.5 ? 'var(--green)' : 'var(--gray1)';

    // Hudson current — from NOAA if available, otherwise estimate from tide timing
    let currentInfo = null;
    if (currentPredictions.length) {
      const cp = currentPredictions.find(c => c.hour === nowH) || currentPredictions[0];
      currentInfo = cp;
    } else if (todayTides.length >= 2) {
      // Sinusoidal estimate between tide events
      const nowTotal = nowH * 60 + nowMin;
      let before = null, after = null;
      for (const t of todayTides) {
        const tMins = t.hour * 60 + (t.minute || 0);
        if (tMins <= nowTotal) before = t; else if (!after) after = t;
      }
      if (before && after) {
        const span    = (after.hour * 60 + (after.minute || 0)) - (before.hour * 60 + (before.minute || 0));
        const elapsed = nowTotal - (before.hour * 60 + (before.minute || 0));
        const sinPhase = Math.sin((elapsed / span) * Math.PI);
        const range    = Math.abs(after.v - before.v);
        currentInfo = {
          speed: Math.round(sinPhase * range * 0.28 * 10) / 10,
          type:  before.type === 'L' ? 'flood' : 'ebb',

    const allClearText = nowH >= 18 ? 'Good through the evening ✓' : nowH >= 12 ? 'Good all afternoon ✓' : 'Good all day ✓';

      for (const h of hours.filter(h => h.hour >= 6 && h.hour <= 20)) {
        if (statuses.liberty[h.hour] === 'green' && statuses.gwb[h.hour] === 'green') {
          if (runStart === null) runStart = h.hour;
          runLen++;
          if (runLen > bestLen) { bestLen = runLen; bestStart = runStart; bestEnd = h.hour; }
        } else { runStart = null; runLen = 0; }
      }
      if (!bestStart || bestEnd < nowH) return '';
      const from = Math.max(bestStart, nowH);
      if (from > bestEnd) return '';
      return `✅ Best window today: ${fmtHour(from)}–${fmtHour(bestEnd + 1)} — both routes in ideal shape.`;
    }
    const bestWindow = bestWindowText();

    function recHtml() {
      if (libSt === 'red' && gwbSt === 'red') {
        return { cls: 'red', html: '⛔ Stay docked. Conditions are too rough for both routes right now.' };
      }
      const lines = [];
      if (libSt !== 'red') {
        lines.push(libBack
          ? `🗽 Liberty route: <strong>head out now — be back by ${fmtHour(libBack)}</strong>.`
          : `🗽 Liberty route: ${allClearText}`);
      } else {
        lines.push('<span style="color:var(--red)">🗽 Liberty route: not recommended — too rough heading south.</span>');
      }
      if (gwbSt !== 'red') {
        lines.push(gwbBack
          ? `🌉 GWB route: <strong>head out now — be back by ${fmtHour(gwbBack)}</strong>.`
          : `🌉 GWB route: ${allClearText}`);
      } else {
        lines.push('<span style="color:var(--red)">🌉 GWB route: not recommended — too rough heading north.</span>');
      }
      const cls = (libSt === 'green' || gwbSt === 'green') ? 'green' : 'yellow';
      return { cls, html: lines.join('<br>') };
    }

    function routeCompareCard() {
      const curH = hours.find(h => h.hour === nowH)     || hours[0];
      const next = hours.find(h => h.hour === nowH + 1) || curH;
      const ph   = tidePhaseAt(todayTides, nowH);
      const ph1  = tidePhaseAt(todayTides, nowH + 1);
      const libScore = Math.max(
        getScore(curH.wind, curH.dir, ph,  'liberty', nowH),
        getScore(next.wind, next.dir, ph1, 'liberty', nowH + 1)
      );
      const gwbScore = Math.max(
        getScore(curH.wind, curH.dir, ph,  'gwb', nowH),
        getScore(next.wind, next.dir, ph1, 'gwb', nowH + 1)
      );
      const diff = Math.abs(libScore - gwbScore);
      if (diff < 2) {
        return `<div class="compare-card">
          <div class="compare-icon">⚖️</div>
          <div class="compare-body">
            <div class="compare-label">Leaving Now</div>
            <div class="compare-tie">Both routes are roughly equal right now.</div>
          </div>
        </div>`;
      }
      let iconImg, winner, reason;
      if (libScore < gwbScore) {
        iconImg = '<img src="StatueOfLibery.png" alt="Statue of Liberty">';
        winner  = 'Statue of Liberty is smoother';
        reason  = `Harbor chop score ~${((gwbScore - libScore) / gwbScore * 100).toFixed(0)}% lower than GWB right now.`;
      } else {
        iconImg = '<img src="GWBridge.PNG" alt="GW Bridge">';
        winner  = 'GW Bridge is smoother';
        const parts = [];
        if (curH.dir >= 150 && curH.dir <= 270 && curH.wind >= 8) parts.push('S/SW wind drives long harbor fetch toward Liberty');
        if (nowH >= 11 && curH.wind >= 8) parts.push('sea breeze is building into the harbor');
        if (!parts.length) parts.push('overall chop score is lower on the Hudson');
        reason = (parts.join('; ') + '.').replace(/^./, c => c.toUpperCase());
      }
      return `<div class="compare-card">
        <div class="compare-icon">${iconImg}</div>
        <div class="compare-body">
          <div class="compare-label">Leaving Now — Smoother Route</div>
          <div class="compare-winner">${winner}</div>
          <div class="compare-reason">${reason}</div>
        </div>
      </div>`;
    }

    function routeGauge(st, score, imgSrc, imgAlt, routeName, backBy, allClear) {
      const R = 85, cx = 100, cy = 100;
      const arcLen = (Math.PI * R).toFixed(1);
      const color = st === 'green' ? '#2ecc71' : st === 'yellow' ? '#f4a020' : '#e74c3c';
      const offset = (Math.PI * R * (1 - (st === 'red' ? 0 : score / 100))).toFixed(1);
      const badgeTxt = st === 'green' ? (score >= 85 ? '✓ IDEAL' : '✓ GO') : st === 'yellow' ? '~ OK' : '✗ NO';
      const noteTxt = backBy ? `Be back by <strong>${fmtHour(backBy)}</strong>` : st !== 'red' ? allClear : 'Wait for conditions to improve';
      return `
        <div class="gauge-card">
          <img src="${imgSrc}" alt="${imgAlt}" class="gauge-icon-img">
          <div class="gauge-route-name">${routeName}</div>
          <svg viewBox="0 0 200 110" style="width:100%;max-width:210px">
            <path d="M 15,100 A ${R},${R} 0 0,1 185,100"
              fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="15" stroke-linecap="round"/>
            <path d="M 15,100 A ${R},${R} 0 0,1 185,100"
              fill="none" stroke="${color}" stroke-width="15" stroke-linecap="round"
              stroke-dasharray="${arcLen}" stroke-dashoffset="${offset}"
              style="filter:drop-shadow(0 0 6px ${color})"/>
            <text x="100" y="75" text-anchor="middle"
              font-size="38" font-weight="900" fill="${color}"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${st === 'red' ? '—' : score}</text>
            <text x="100" y="93" text-anchor="middle"
              font-size="11" fill="rgba(255,255,255,0.3)"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">/ 100</text>
          </svg>
          <span class="gauge-badge ${st}">${badgeTxt}</span>
          <div class="gauge-note">${noteTxt}</div>
        </div>`;
    }

    function combinedTimeline() {
      const cols = hours
        .filter(h => h.hour >= 7 && h.hour <= 21)
        .map(h => {
          const libSt  = statuses.liberty[h.hour] || 'yellow';
          const gwbSt  = statuses.gwb[h.hour]     || 'yellow';
          const libDs  = hourlyScores.liberty[h.hour] || 0;
          const gwbDs  = hourlyScores.gwb[h.hour]     || 0;
          const past   = h.hour < nowH;
          const isNow  = h.hour === nowH;
          const libCls = libDs >= 85 && libSt === 'green' ? 'ideal' : libSt;
          const gwbCls = gwbDs >= 85 && gwbSt === 'green' ? 'ideal' : gwbSt;
          const lbl    = isNow ? 'NOW' : fmtHour(h.hour);
          return `<div class="t-col${past ? ' t-past' : ''}${isNow ? ' t-now t-selected' : ''}" data-hour="${h.hour}" onclick="window._selectHour(${h.hour})">
            <span class="t-hour-lbl">${lbl}</span>
            <div class="t-dot ${libCls}"></div>
            <div class="t-dot ${gwbCls}"></div>
          </div>`;
        }).join('');
      return `<div class="timeline-section">
        <div class="tl-header">
          <span class="tl-title">📅 Tap a time to explore</span>
          <span class="tl-viewing" id="tl-viewing">Now</span>
        </div>
        <div class="tl-legend">
          <div class="tl-legend-item"><img src="StatueOfLibery.png" alt="">Liberty (top)</div>
          <div class="tl-legend-item"><img src="GWBridge.PNG" alt="">GW Bridge (bottom)</div>
        </div>
        <div class="tl-scroll" id="tl-scroll">${cols}</div>
      </div>`;
    }

    window._selectHour = function(h) {
      document.querySelectorAll('.t-col').forEach(el =>
        el.classList.toggle('t-selected', parseInt(el.dataset.hour) === h));
      const viewEl = document.getElementById('tl-viewing');
      if (viewEl) viewEl.textContent = h === nowH ? 'Now' : fmtHour(h);

      const libSt    = statuses.liberty[h] || 'yellow';
      const gwbSt    = statuses.gwb[h]     || 'yellow';
      const libScore = hourlyScores.liberty[h] || 0;
      const gwbScore = hourlyScores.gwb[h]     || 0;

      const gaugesEl = document.getElementById('route-gauges');
      if (gaugesEl) {
        gaugesEl.innerHTML =
          routeGauge(libSt, libScore, 'StatueOfLibery.png', 'Statue of Liberty', 'Statue of Liberty', h === nowH ? libBack : null, allClearText) +
          routeGauge(gwbSt, gwbScore, 'GWBridge.PNG',       'GW Bridge',         'GW Bridge',         h === nowH ? gwbBack : null, allClearText);
      }

      const heroEl = document.getElementById('hero-verdict-inner');
      if (heroEl) {
        const bRed = libSt === 'red'   && gwbSt === 'red';
        const bGrn = libSt === 'green' && gwbSt === 'green';
        const best = statusRank[libSt] <= statusRank[gwbSt]
          ? { st: libSt,  score: libScore, name: 'Liberty'   }
          : { st: gwbSt,  score: gwbScore, name: 'GW Bridge' };
        let lbl, sub, cls;
        if (bRed) {
          lbl = '✗ Stay Docked';      sub = 'Conditions are too rough on both routes'; cls = 'hero-red';
        } else if (best.st === 'green' && best.score >= 85) {
          lbl = '✦ Ideal Conditions'; sub = bGrn ? 'Both routes look great' : `${best.name} is your best option`; cls = 'hero-green';
        } else if (best.st === 'green') {
          lbl = '✓ Good to Go';       sub = bGrn ? 'Both routes are in good shape' : `${best.name} route recommended`; cls = 'hero-green';
        } else {
          lbl = '⚠ Use Caution';      sub = `${best.name} route is your best option`; cls = 'hero-yellow';
        }
        heroEl.innerHTML = `<div class="hero-label ${cls}">${lbl}</div>
          <div class="hero-sub">${sub}${h !== nowH ? ` <span style="color:var(--teal);font-weight:600">· ${fmtHour(h)}</span>` : ''}</div>`;
      }
      document.body.className = cls === 'hero-green' ? 'theme-green' : cls === 'hero-yellow' ? 'theme-yellow' : 'theme-red';
    };

    function hourlyGrid(routeKey) {
      return hours
        .filter(h => h.hour >= 6 && h.hour <= 20)
        .map(h => {
          const st      = statuses[routeKey][h.hour] || 'yellow';
          const ds      = hourlyScores[routeKey][h.hour] || 0;
          const past    = h.hour < nowH;
          const isNow   = h.hour === nowH;
          const isIdeal = st === 'green' && ds >= 85;
          const lbl = isNow ? 'NOW' : fmtHour(h.hour);
          const txt = isIdeal ? 'IDEAL' : st === 'green' ? 'GO' : st === 'yellow' ? 'OK' : 'NO';
          const cls = `h-box ${st}${past ? ' past' : ''}${isIdeal ? ' ideal' : ''}`;
          return `<div class="h-block">
            <span class="h-label${isNow ? ' now' : ''}">${lbl}</span>
            <div class="${cls}">
              <span style="line-height:1.1">${txt}</span>
              <span style="font-size:0.5rem;font-weight:700;opacity:0.85;line-height:1.1">${st === 'red' ? '—' : ds}</span>
            </div>
            <span class="h-wind">${h.wind.toFixed(0)}mph ${dirArrow(h.dir)}</span>
          </div>`;
        }).join('');
    }

    function tomorrowMorningCard() {
      const morning = tomorrowHours.filter(h => h.hour >= 6 && h.hour <= 8);
      if (!morning.length) return '';
      const avgWind = morning.reduce((s, h) => s + h.wind, 0) / morning.length;
      const maxGust = Math.max(...morning.map(h => h.gust || 0));
      const rank    = { green: 0, yellow: 1, red: 2 };
      const libSts    = morning.map(h => getStatus(h.wind, h.gust, h.dir, tidePhaseAt(tomorrowTides, h.hour), 'liberty', h.hour));
      const gwbSts    = morning.map(h => getStatus(h.wind, h.gust, h.dir, tidePhaseAt(tomorrowTides, h.hour), 'gwb',     h.hour));
      const libScores = morning.map(h => routeDisplayScore(h.wind, h.gust, h.dir, tidePhaseAt(tomorrowTides, h.hour), 'liberty', h.hour));
      const gwbScores = morning.map(h => routeDisplayScore(h.wind, h.gust, h.dir, tidePhaseAt(tomorrowTides, h.hour), 'gwb',     h.hour));
      const wLib      = libSts.reduce((w, s) => rank[s] > rank[w] ? s : w, 'green');
      const wGwb      = gwbSts.reduce((w, s) => rank[s] > rank[w] ? s : w, 'green');
      const avgLibScore = Math.round(libScores.reduce((a, b) => a + b, 0) / libScores.length);
      const avgGwbScore = Math.round(gwbScores.reduce((a, b) => a + b, 0) / gwbScores.length);
      const libTxt  = wLib === 'green' ? (avgLibScore >= 85 ? '✓ IDEAL' : '✓ GO') : wLib === 'yellow' ? '~ OK' : '✗ NO';
      const gwbTxt  = wGwb === 'green' ? (avgGwbScore >= 85 ? '✓ IDEAL' : '✓ GO') : wGwb === 'yellow' ? '~ OK' : '✗ NO';
      const gustNote = maxGust > avgWind * 1.3 ? ` · gusts to ${maxGust.toFixed(0)} mph` : '';
      const tideNote = tomorrowTides.length ? '' : ' · tide not factored in';
      return `<div class="summary-card">
        <div class="card-title">🌅 Tomorrow — Early Morning Window (6–9 AM)</div>
        <p class="summary-text" style="margin-bottom:0.6rem">Wind forecast: ~${avgWind.toFixed(0)} mph${gustNote}${tideNote}</p>
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
          <span style="font-size:0.78rem">🗽 Liberty: <span class="status-badge ${wLib}" style="font-size:0.72rem;padding:0.22rem 0.75rem;vertical-align:middle">${libTxt}</span></span>
          <span style="font-size:0.78rem">🌉 GWB: <span class="status-badge ${wGwb}" style="font-size:0.72rem;padding:0.22rem 0.75rem;vertical-align:middle">${gwbTxt}</span></span>
        </div>
      </div>`;
    }

    function tripPlannerCard() {
      const startH = Math.max(nowH, 6);
      const opts   = Array.from({length: 15}, (_, i) => i + 6)
        .map(h => `<option value="${h}"${h === startH ? ' selected' : ''}>${fmtHour(h)}</option>`)
        .join('');
      return `<div class="summary-card">
        <div class="card-title">🗺️ Trip Planner</div>
        <p class="summary-text" style="color:var(--gray1);margin-bottom:0.65rem">Pick a departure time and trip length to see conditions both ways.</p>
        <div style="display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;">
          <select id="tp-depart" class="tp-select">${opts}</select>
          <select id="tp-dur" class="tp-select">
            <option value="1">1 hour</option>
            <option value="2" selected>2 hours</option>
            <option value="3">3 hours</option>
            <option value="4">4 hours</option>
            <option value="5">5 hours</option>
          </select>
          <button class="tp-btn" onclick="checkTrip()">Check →</button>
        </div>
        <div id="tp-result" class="tp-result"></div>
      </div>`;
    }

    function alertBannerHtml() {
      if (!activeAlerts.length) return '';
      return activeAlerts.map(a => {
        const evt  = a.properties.event    || 'Marine Alert';
        const head = a.properties.headline || '';
        return `<div class="alert-banner">⚠️ <strong>${evt}</strong>${head ? ' — ' + head : ''}</div>`;
      }).join('');
    }

    const rec      = recHtml();
    const updated  = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const gustBar    = cur.gust > cur.wind * 1.3 ? ` (gusts ${cur.gust.toFixed(0)})` : '';
    const tideBar    = tideCountdown ? ` · ${tideCountdown}` : '';
    const visBar     = visMiles < 5 ? `<span>👁️ <strong>${visMiles < 1 ? 'Dense fog' : 'Reduced visibility'}: ${visMiles.toFixed(1)} mi</strong></span>` : '';
    const currentBar = currentInfo && currentInfo.speed >= 0.1
      ? `<span>🌀 Current: <strong>${currentInfo.speed.toFixed(1)} kts ${currentInfo.type === 'flood' ? '↑ Flooding' : '↓ Ebbing'}${currentInfo.estimated ? ' (est.)' : ''}</strong></span>`
      : '';

    document.getElementById('app').innerHTML = `
      <div class="cond-bar">
        <span>💨 <strong>${cur.wind.toFixed(0)} mph${gustBar} ${windLabel(cur.dir)} <span style="color:${windTrendColor}">${windTrendArrow}</span></strong></span>
        <span><strong>${weatherIcon(cur.code)}${cur.code <= 48 && cur.precip > 20 ? ` · ${cur.precip}% rain chance` : ''}</strong></span>
        <span>🌡️ Pressure: <strong style="color:${pressureTrendColor}">${pressureTrendLabel}</strong></span>
        <span>🌊 Tide: <strong>${tideNow === 'flood' ? '↑ Rising' : tideNow === 'ebb' ? '↓ Falling' : '⟳ Still'}${tideBar}</strong></span>
        ${currentBar}
        ${sunset ? `<span>🌅 Sunset: <strong>${sunset}</strong></span>` : ''}
        ${visBar}
        ${jetSki === 'extreme' ? `<span>🛥️ Jet skis: <strong style="color:var(--red)">Extreme</strong></span>` : ''}
      </div>
      ${alertBannerHtml()}
      ${combinedTimeline()}
      <div class="hero-verdict">
        <div id="hero-verdict-inner">
          <div class="hero-label ${heroClass}">${heroLabel}</div>
          <div class="hero-sub">${heroSub}</div>
        </div>
      </div>
      <div class="content">
        <div class="routes" id="route-gauges">
          ${routeGauge(libSt, libDisplayScore, 'StatueOfLibery.png', 'Statue of Liberty', 'Statue of Liberty', libBack, allClearText)}
          ${routeGauge(gwbSt, gwbDisplayScore, 'GWBridge.PNG', 'GW Bridge', 'GW Bridge', gwbBack, allClearText)}
        </div>

        ${routeCompareCard()}

        <div class="summary-card">
          <div class="card-title">⚓ Conditions Summary</div>
          <p class="summary-text">${summaryParts.join(' ')}</p>
          ${bestWindow ? `<p class="summary-text" style="margin-top:0.65rem;color:#90ffc0">${bestWindow}</p>` : ''}
          <div class="rec-box ${rec.cls}">${rec.html}</div>
        </div>

        ${tomorrowMorningCard()}

        ${tripPlannerCard()}

        <p class="footer">Updated ${updated} (<span id="last-updated">just now</span>) · Auto-refreshes every 15 min · Wind: Open-Meteo · Tides: NOAA (The Battery)</p>
      </div>`;

    // Scroll timeline to NOW column
    setTimeout(() => {
      const nowCol = document.querySelector('.t-col.t-now');
      if (nowCol) nowCol.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }, 150);

  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = `
      <div class="loading">
        <p style="color:var(--red)">⚠️ Could not load forecast.</p>
        <p style="color:var(--gray1);font-size:0.7rem;margin-top:0.5rem">${err}</p>
        <br><button class="refresh-btn" onclick="loadForecast()">↻ Try Again</button>
      </div>`;
  }
}

loadForecast();
setInterval(loadForecast, 15 * 60 * 1000);
</script>
</body>
</html>
